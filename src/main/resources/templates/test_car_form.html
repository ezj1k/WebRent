<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>WebRent - Detalii Mașină</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2 th:text="${car.id == null ? 'Adaugă Mașină Nouă' : 'Editează Mașina'}"></h2>
<hr>

<form th:action="@{/cars/save}" th:object="${car}" method="POST" class="row g-3">
    <input type="hidden" th:field="*{id}">

    <div class="col-md-4">
        <label class="form-label">Brand</label>
        <input type="text" th:field="*{brand}" class="form-control" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Model</label>
        <input type="text" th:field="*{model}" class="form-control" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">An Fabricație</label>
        <input type="number" th:field="*{year}" class="form-control">
    </div>
    <div class="col-md-6">
        <label class="form-label">Nr. Înmatriculare</label>
        <input type="text" th:field="*{licensePlate}" class="form-control" required>
    </div>
    <div class="col-md-6">
        <label class="form-label">Preț pe zi (EUR)</label>
        <input type="number" step="0.01" th:field="*{pricePerDay}" class="form-control">
    </div>

    <div class="col-md-3">
        <label class="form-label">Categorie</label>
        <select th:field="*{category}" class="form-select">
            <option th:each="cat : ${T(com.usm.WebRent.entity.enums.CarCategory).values()}"
                    th:value="${cat}" th:text="${cat}"></option>
        </select>
    </div>

    <div class="col-md-3">
        <label class="form-label">Status</label>
        <select th:field="*{status}" class="form-select">
            <option th:each="st : ${T(com.usm.WebRent.entity.enums.CarStatus).values()}"
                    th:value="${st}" th:text="${st}"></option>
        </select>
    </div>

    <div class="col-12 mt-4">
        <button type="submit" class="btn btn-success">Salvează Mașina</button>
        <a th:href="@{/cars}" class="btn btn-secondary">Anulează</a>
    </div>
</form>
</body>
</html>
