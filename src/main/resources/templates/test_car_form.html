<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: layout}"></th:block>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{layout :: header}"></div>

<main class="container my-5">
    <div class="card shadow-sm">
        <div class="card-header bg-white py-3">
            <h3 class="mb-0" th:text="${car.id == null ? 'Adaugă Mașină Nouă' : 'Editează Mașina: ' + car.brand + ' ' + car.model}"></h3>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/cars/save}" th:object="${car}" method="POST" class="row g-3" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}">

                <div class="col-md-4">
                    <label class="form-label fw-bold">Brand</label>
                    <input type="text" th:field="*{brand}" class="form-control"  required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Model</label>
                    <input type="text" th:field="*{model}" class="form-control"  required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">An Fabricație</label>
                    <input type="number" th:field="*{year}" class="form-control" >
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold">Nr. Înmatriculare</label>
                    <input type="text" th:field="*{licensePlate}" class="form-control" placeholder="ex: ABC 123" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Preț pe zi (EUR)</label>
                    <input type="number" step="0.01" th:field="*{pricePerDay}" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Categorie</label>
                    <select th:field="*{category}" class="form-select">
                        <option th:each="cat : ${T(com.usm.WebRent.entity.enums.CarCategory).values()}"
                                th:value="${cat}" th:text="${cat}"></option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold">Transmisie</label>
                    <select th:field="*{transmission}" class="form-select">
                        <option th:each="trans : ${T(com.usm.WebRent.entity.enums.CarTransmision).values()}"
                                th:value="${trans}" th:text="${trans}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Volum Motor (L)</label>
                    <input type="number" step="0.1" th:field="*{engineVolume}" class="form-control" placeholder="2.0">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Tip Combustibil</label>
                    <select th:field="*{fuelType}" class="form-select">
                        <option th:each="fuel : ${T(com.usm.WebRent.entity.enums.CarFuelType).values()}"
                                th:value="${fuel}" th:text="${fuel}"></option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold">Status</label>
                    <select th:field="*{status}" class="form-select">
                        <option th:each="st : ${T(com.usm.WebRent.entity.enums.CarStatus).values()}"
                                th:value="${st}" th:text="${st}"></option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label fw-bold">URL Imagine</label>
                    <!-- ✅ Correct -->
                    <input type="hidden" name="imageUrl" th:value="${car.imageUrl}">
                    <input type="file" name="imageFile" class="form-control" accept="image/*">
                    <div class="form-text">Alege o fotografie (JPG, PNG).</div>
                </div>

                <div class="col-12">
                    <label class="form-label fw-bold">Dotări (Features)</label>
                    <textarea th:field="*{features}" class="form-control" rows="3" placeholder="Scaune incalzite, Senzori parcare, Apple CarPlay..."></textarea>
                    <div class="form-text">Separă dotările prin virgulă.</div>
                </div>

                <div class="col-12 mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-danger px-5">Salvează Mașina</button>
                    <a th:href="@{/cars}" class="btn btn-outline-secondary">Înapoi la listă</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>

</body>
</html>
